<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3BB095">
<meta name="description" content="ScanEan - Gestione intelligente della dispensa con scanner barcode">
<title>ScanEan - Gestione Dispensa</title>

/* Stili aggiuntivi per ricette TheMealDB */
.recipe-img-thumb {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}
.recipe-img-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.recipe-card .recipe-header {
  align-items: center;
}

/* Stats card cliccabili */
.stat-card {
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.stat-card:active {
  transform: scale(0.96);
}

/* Modal ordinamento */
.sort-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-radius: var(--radius-md);
  background: var(--bg);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.sort-option:active {
  transform: scale(0.98);
}
.sort-option.active {
  border-color: var(--primary);
  background: rgba(59,176,149,0.08);
}
.sort-option-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sort-option-text {
  flex: 1;
}
.sort-option-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}
.sort-option-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.sort-check {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
}
.sort-check.hidden {
  display: none;
}

/* Modal INFO prodotto */
.info-section {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(59,176,149,0.08);
}
.info-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
}
.info-section-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.nutri-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.nutri-item {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.nutri-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.nutri-value {
  font-size: 16px;
  font-weight: 800;
  color: var(--primary);
  margin-top: 2px;
}

/* Info modal immagine */
.info-img {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 16px;
  overflow: hidden;
}
.info-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== MODAL CONFERMA DATA SCADENZA ===== */

  align-items: center;
  justify-content: center;
}
.expiry-confirm-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.expiry-detected-date {

  font-weight: 800;
  color: var(--primary);
  margin-bottom: 4px;
  text-align: center;
}
